# 将以下内容粘贴到 Streamlit Community Cloud 的 Secrets 配置中。
# 根级键会自动作为环境变量提供给应用。

EXCEL_INPUT_PATH="/mount/src/data/uploads"
EXCEL_UPLOAD_DIR="/mount/src/data/uploads"
EXCEL_TARGET_COLUMN_LETTER="B"

SEARCH_PROVIDER="tavily,qcc,duckduckgo"
SEARCH_LOOKBACK_DAYS="365"
MAINLAND_SOURCE_MODE="prefer"
MAINLAND_SOURCE_DOMAINS="people.com.cn,xinhuanet.com,cctv.com,chinanews.com.cn,china.com.cn,gmw.cn,cnr.cn,thepaper.cn,caixin.com,yicai.com,21jingji.com,nbd.com.cn,eastmoney.com,10jqka.com.cn,cnstock.com,stcn.com,cs.com.cn,cls.cn,jrj.com.cn,finance.sina.com.cn,finance.ifeng.com,qq.com,163.com,sohu.com,gov.cn,csrc.gov.cn,sse.com.cn,szse.cn"
REQUEST_DELAY_SECONDS="1.5"
REQUEST_TIMEOUT_SECONDS="20"
REQUEST_RETRY_ATTEMPTS="3"
REQUEST_RETRY_BACKOFF_SECONDS="3"
REQUEST_RETRY_BACKOFF_MAX_SECONDS="20"
MAX_RESULTS_PER_ENTITY="10"
ANNOTATED_EXCEL_NEWS_LIMIT="10"

TAVILY_API_KEY="你的 Tavily Key"
QCC_ACCOUNT="你的企查查开放平台账号（可选）"
QCC_APP_KEY="你的企查查 APPKEY"
QCC_SECRET_KEY="你的企查查 SecretKey"
QCC_NEWS_ENDPOINT="https://api.qichacha.com/CompanyNews/SearchNews"
QCC_PAGE_SIZE="10"
OPENAI_API_KEY="你的 DeepSeek Key"
OPENAI_BASE_URL="https://api.deepseek.com/v1"
LLM_MODEL="deepseek-chat"
LLM_MAX_ARTICLES_FOR_PROMPT="50"
EMAIL_SUMMARY_CHAR_LIMIT="220"

SMTP_HOST="smtp.qq.com"
SMTP_PORT="465"
SMTP_USERNAME="你的邮箱"
SMTP_PASSWORD="你的授权码"
SMTP_SENDER="你的邮箱"
SMTP_USE_SSL="true"

EMAIL_RECIPIENTS="liuguangyuan@natrust.cn"
SCHEDULE_TIME="07:30"
